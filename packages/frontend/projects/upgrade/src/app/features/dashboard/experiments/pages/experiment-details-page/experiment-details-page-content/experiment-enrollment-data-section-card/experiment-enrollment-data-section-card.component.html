@if (selectedExperiment$ | async; as experiment) {
<app-common-section-card>
  <!-- header-left -->
  <app-common-section-card-title-header
    header-left
    [title]="'experiments.details.enrollment-data.card.title.text' | translate"
    [subtitle]="'experiments.details.enrollment-data.card.subtitle.text' | translate"
  ></app-common-section-card-title-header>
  <!-- header-right -->
  <app-common-section-card-action-buttons
    header-right
    [showPrimaryButton]="false"
    [isSectionCardExpanded]="isSectionCardExpanded"
    (sectionCardExpandChange)="onSectionCardExpandChange($event)"
  >
  </app-common-section-card-action-buttons>
  <!-- content -->
  @if (isSectionCardExpanded) {
  <app-experiment-enrollment-data content [experiment]="experiment"></app-experiment-enrollment-data>
  }
</app-common-section-card>
}
