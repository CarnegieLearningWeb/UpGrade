@if (selectedExperiment$ | async; as experiment) {
<app-common-section-card>
  <!-- header-left -->
  <app-common-section-card-title-header
    header-left
    [title]="'experiments.details.metrics-data.card.title.text' | translate"
    [subtitle]="'experiments.details.metrics-data.card.subtitle.text' | translate"
  ></app-common-section-card-title-header>
  <!-- header-right -->
  <app-common-section-card-action-buttons
    header-right
    [showPrimaryButton]="false"
    [isSectionCardExpanded]="isSectionCardExpanded"
    (sectionCardExpandChange)="onSectionCardExpandChange($event)"
  >
  </app-common-section-card-action-buttons>
  <!-- content -->
  @if (isSectionCardExpanded) {
  <div content class="data-container">
    <app-experiment-query-result
      [experiment]="experiment"
      [isLoadingExperiment]="isLoadingExperiment$ | async"
    ></app-experiment-query-result>
  </div>
  }
</app-common-section-card>
}
