@if (selectedSegment$ | async; as segment) {
<app-common-section-card>
  <!-- header-left -->
  <app-common-section-card-title-header
    header-left
    [title]="'segments.details.used-by.card.title.text' | translate"
    [subtitle]="'segments.details.used-by.card.subtitle.text' | translate"
    [tableRowCount]="tableRowCount$ | async"
  ></app-common-section-card-title-header>
  <!-- header-right -->
  <app-common-section-card-action-buttons
    header-right
    [isSectionCardExpanded]="isSectionCardExpanded"
    (sectionCardExpandChange)="onSectionCardExpandChange($event)"
  >
  </app-common-section-card-action-buttons>
  <!-- content -->
  @if (isSectionCardExpanded) {
  <app-segment-used-by-table content></app-segment-used-by-table>
  }
</app-common-section-card>
}
