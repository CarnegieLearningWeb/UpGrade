<div class="action-buttons">
  <div class="main-container">
    @if (showSlideToggle) {
    <div [matTooltip]="slideToggleTooltip" [matTooltipDisabled]="!slideToggleDisabled" matTooltipPosition="above">
      <mat-slide-toggle
        color="primary"
        [checked]="slideToggleChecked"
        [disabled]="slideToggleDisabled"
        (change)="onSlideToggleChange($event)"
      >
        {{ slideToggleText }}
      </mat-slide-toggle>
    </div>
    }

    <!-- New: Support for multiple action buttons -->
    @if (actionButtons && actionButtons.length > 0) { @for (button of actionButtons; track button) {
    <div
      [matTooltip]="button.tooltip"
      [matTooltipDisabled]="!button.disabled"
      [matTooltipClass]="button.tooltipClass"
      matTooltipPosition="above"
    >
      <button
        mat-flat-button
        [ngClass]="button.colorClass"
        [disabled]="button.disabled"
        (click)="onActionButtonClick(button.action)"
      >
        @if (button.icon) {
        <mat-icon>{{ button.icon }}</mat-icon>
        }
        <span>{{ button.translationKey | translate }}</span>
      </button>
    </div>
    } }

    <!-- Legacy: Single primary button (for backward compatibility) -->
    @if (showPrimaryButton) {
    <div
      [matTooltip]="primaryButtonTooltip"
      [matTooltipDisabled]="!primaryActionBtnDisabled"
      matTooltipPosition="above"
    >
      <button mat-flat-button color="primary" [disabled]="primaryActionBtnDisabled" (click)="onPrimaryButtonClick()">
        @if (primaryButtonIcon) {
        <mat-icon>{{ primaryButtonIcon }}</mat-icon>
        }
        <span>{{ primaryButtonText }}</span>
      </button>
    </div>
    }
  </div>

  <div class="options-container dense-2">
    @if (showMenuButton) {
    <div [matTooltip]="menuButtonTooltip" [matTooltipDisabled]="!menuButtonDisabled" matTooltipPosition="above">
      <button mat-icon-button [matMenuTriggerFor]="menu" [disabled]="menuButtonDisabled">
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>
    }
    <mat-menu #menu="matMenu">
      @for (item of menuButtonItems; track item) { @if (!item.disabled) {
      <button mat-menu-item (click)="onMenuButtonItemClick(item.action)">
        <span class="ft-14-400">{{ item.label | translate | titlecase }}</span>
      </button>
      } }
    </mat-menu>

    <div
      [matTooltip]="sectionCardExpandBtnTooltip"
      [matTooltipDisabled]="!sectionCardExpandBtnDisabled"
      matTooltipPosition="above"
    >
      <button mat-icon-button [disabled]="sectionCardExpandBtnDisabled" (click)="onSectionCardExpandChange()">
        <mat-icon>{{ isSectionCardExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
      </button>
    </div>
  </div>
</div>
