@if (tags && tags.length > 0) {
<mat-chip-listbox aria-label="tags">
  @for (tag of visibleTags; track tag) {
  <app-common-tag [tag]="tag" (tagClick)="onTagClick($event)"> </app-common-tag>
  } @if (shouldShowMoreChip) {
  <mat-chip (click)="toggleExpanded()">
    <span class="chip-label">+{{ hiddenTagsCount }}</span>
  </mat-chip>
  }
</mat-chip-listbox>
}
