<mat-accordion class="accordion">
  <mat-expansion-panel hideToggle="true">
    <mat-expansion-panel-header class="expansion-header" expandedHeight="*" collapsedHeight="*">
      <mat-panel-title>
        <span class="ft-16-400 action-msg">{{ actionMessage }}</span>
        <span class="ft-12-600 view-diff" [innerHTML]="'logs-global.log-view-diff.text' | translate"></span>
      </mat-panel-title>
    </mat-expansion-panel-header>

    <pre><div class="ft-14-400 diff-container" [id]="'diff-' + logId">{{ renderDiff() }}</div></pre>
  </mat-expansion-panel>
</mat-accordion>
