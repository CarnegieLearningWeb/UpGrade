<div class="chip-container dense-2">
  <mat-chip class="status-indicator" [ngClass]="chipClass">
    <span class="chip-label">
      {{ chipText }}
    </span>
  </mat-chip>
  @if (warningMessageKeys.length > 0) {
  <app-common-warning-icon [warningMessageKeys]="warningMessageKeys" class="warning-icon"></app-common-warning-icon>
  }
</div>
