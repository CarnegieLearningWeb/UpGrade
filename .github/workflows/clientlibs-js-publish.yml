name: UpGrade Client Libs JS Publish
on:
  push:
    branches:
      - main
    paths:
      - clientlibs/js/**
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag ref to publish'
        required: true
        default: 'main'  
jobs:
  clientlibs-js-publish:
    name: UpGrade Client Libs JS Publish
    runs-on: ubuntu-latest
    steps:
      - name: Set Input Variables
        id: set-vars
        run: |
          echo "::set-output name=ref::${{ inputs.ref || github.event.inputs.ref }}"
      - name: Git Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.set-vars.outputs.ref }}
      - name: Build Types Package
        uses: ./.github/actions/generic-npm-build
        with:
          working_directory: clientlibs/js

      # Publish main package (backward compatibility)
      - name: Publish upgrade_client_lib
        uses: JS-DevTools/npm-publish@v1
        with:
          token: ${{ secrets.NPM_TOKEN }}
          package: clientlibs/js/package.json

      # Publish specialized packages
      - name: Publish upgrade_client_lib_full_browser
        uses: JS-DevTools/npm-publish@v1
        with:
          token: ${{ secrets.NPM_TOKEN }}
          package: clientlibs/js/packages/full-browser/package.json

      - name: Publish upgrade_client_lib_full_node
        uses: JS-DevTools/npm-publish@v1
        with:
          token: ${{ secrets.NPM_TOKEN }}
          package: clientlibs/js/packages/full-node/package.json

      - name: Publish upgrade_client_lib_lite
        uses: JS-DevTools/npm-publish@v1
        with:
          token: ${{ secrets.NPM_TOKEN }}
          package: clientlibs/js/packages/lite/package.json