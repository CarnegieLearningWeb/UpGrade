@if (vm$ | async; as vm) {
  @let canShowActions = vm.permissions?.experiments.update && !vm.restriction.shouldHideActions;
  @let restrictionTooltip = vm.restriction.tooltipKey | translate;
  @let appContext = vm.experiment.context[0];

  <app-common-section-card>
    <!-- header-left -->
    <app-common-section-card-title-header
      header-left
      [title]="'experiments.details.decision-points.card.title.text' | translate"
      [subtitle]="'experiments.details.decision-points.card.subtitle.text' | translate"
      [tableRowCount]="vm.experiment.partitions?.length || 0"
    ></app-common-section-card-title-header>

    <!-- header-right -->
    <app-common-section-card-action-buttons
      header-right
      [showPrimaryButton]="canShowActions"
      [primaryButtonText]="'experiments.details.add-decision-point.button.text' | translate"
      [primaryActionBtnDisabled]="vm.restriction.isDisabled"
      [primaryButtonTooltip]="restrictionTooltip"
      [isSectionCardExpanded]="isSectionCardExpanded"
      (primaryButtonClick)="onAddDecisionPointClick(vm.experiment.id, appContext)"
      (sectionCardExpandChange)="onSectionCardExpandChange($event)"
    >
    </app-common-section-card-action-buttons>

    <!-- content -->
    @if (isSectionCardExpanded) {
      <app-experiment-decision-points-table
        content
        [decisionPoints]="vm.experiment.partitions || []"
        [isLoading$]="experimentService.isLoadingSelectedExperiment$"
        [showActions]="canShowActions"
        [actionsDisabled]="vm.restriction.isDisabled"
        [actionsTooltip]="restrictionTooltip"
        (rowAction)="onRowAction($event, vm.experiment.id, appContext)"
      ></app-experiment-decision-points-table>
    }
  </app-common-section-card>
}
