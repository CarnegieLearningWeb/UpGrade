@if (vm$ | async; as vm) { @let canShowSegmentActions = vm.permissions?.segments.update &&
!vm.restriction.shouldHideActions; @let restrictionTooltip = vm.restriction.tooltipKey | translate; @let appContext =
vm.experiment.context[0];

<app-common-section-card>
  <!-- header-left -->
  <app-common-section-card-title-header
    header-left
    [title]="'experiments.details.exclusions.card.title.text' | translate"
    [subtitle]="'experiments.details.exclusions.card.subtitle.text' | translate"
    [tableRowCount]="tableRowCount$ | async"
  ></app-common-section-card-title-header>

  <!-- header-right -->
  <app-common-section-card-action-buttons
    header-right
    [showPrimaryButton]="canShowSegmentActions"
    [primaryButtonText]="'experiments.details.add-exclude-list.button.text' | translate"
    [primaryActionBtnDisabled]="vm.restriction.isDisabled"
    [primaryButtonTooltip]="restrictionTooltip"
    [showMenuButton]="true"
    [menuButtonItems]="menuButtonItems$ | async"
    [menuButtonDisabled]="menuButtonDisabled$ | async"
    [menuButtonTooltip]="restrictionTooltip"
    [isSectionCardExpanded]="isSectionCardExpanded"
    (primaryButtonClick)="onAddExcludeListClick(appContext, vm.experiment.id)"
    (menuButtonItemClick)="onMenuButtonItemClick($event, vm.experiment)"
    (sectionCardExpandChange)="onSectionCardExpandChange($event)"
  >
  </app-common-section-card-action-buttons>

  <!-- content -->
  @if (isSectionCardExpanded) {
  <app-experiment-exclusions-table
    content
    [showActions]="canShowSegmentActions"
    [actionsDisabled]="vm.restriction.isDisabled"
    [actionsTooltip]="restrictionTooltip"
    (rowAction)="onRowAction($event, vm.experiment.id)"
  ></app-experiment-exclusions-table>
  }
</app-common-section-card>
}
