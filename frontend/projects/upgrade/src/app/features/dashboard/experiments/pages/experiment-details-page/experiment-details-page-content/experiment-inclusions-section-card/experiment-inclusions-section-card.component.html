@if (vm$ | async; as vm) {
  <app-common-section-card>
    <!-- header-left -->
    <app-common-section-card-title-header
      header-left
      [title]="'experiments.details.inclusions.card.title.text' | translate"
      [subtitle]="'experiments.details.inclusions.card.subtitle.text' | translate"
      [tableRowCount]="rowCountWithInclude$ | async"
    ></app-common-section-card-title-header>

    <!-- header-right -->
    <app-common-section-card-action-buttons
      header-right
      [showSlideToggle]="vm.permissions?.segments.update || vm.restriction.isIncludeAll"
      [slideToggleText]="'experiments.details.inclusions.include-all.toggle.text' | translate"
      [slideToggleChecked]="vm.restriction.isIncludeAll"
      [slideToggleDisabled]="!vm.permissions?.segments.update || vm.restriction.isDisabled"
      [slideToggleTooltip]="vm.restriction.slideToggleTooltipKey | translate"
      [showPrimaryButton]="vm.permissions?.segments.update"
      [primaryButtonText]="'experiments.details.add-include-list.button.text' | translate"
      [primaryActionBtnDisabled]="vm.restriction.isDisabled || vm.restriction.isIncludeAll"
      [primaryButtonTooltip]="vm.restriction.tooltipKey | translate"
      [showMenuButton]="true"
      [menuButtonItems]="menuButtonItems$ | async"
      [menuButtonDisabled]="vm.restriction.isIncludeAll"
      [menuButtonTooltip]="vm.restriction.tooltipKey | translate"
      [isSectionCardExpanded]="isSectionCardExpanded && !vm.restriction.isIncludeAll"
      [sectionCardExpandBtnDisabled]="vm.restriction.isIncludeAll"
      [sectionCardExpandBtnTooltip]="vm.restriction.tooltipKey | translate"
      (primaryButtonClick)="onAddIncludeListClick(vm.experiment.context[0], vm.experiment.id)"
      (menuButtonItemClick)="onMenuButtonItemClick($event, vm.experiment)"
      (slideToggleChange)="onSlideToggleChange($event, vm.experiment)"
      (sectionCardExpandChange)="onSectionCardExpandChange($event)"
    >
    </app-common-section-card-action-buttons>

    <!-- content -->
    @if (isSectionCardExpanded && !vm.restriction.isIncludeAll) {
      <app-experiment-inclusions-table
        content
        [showActions]="vm.permissions?.segments.update"
        [actionsDisabled]="vm.restriction.isDisabled"
        [actionsTooltip]="vm.restriction.tooltipKey | translate"
        (rowAction)="onRowAction($event, vm.experiment.id)"
      ></app-experiment-inclusions-table>
    }
  </app-common-section-card>
}
