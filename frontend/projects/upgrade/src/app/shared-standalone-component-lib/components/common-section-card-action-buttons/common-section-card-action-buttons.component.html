<div class="action-buttons">
  <div class="main-container">
    <mat-slide-toggle
      *ngIf="showSlideToggle"
      color="primary"
      [checked]="slideToggleChecked"
      [disabled]="slideToggleDisabled"
      (change)="onSlideToggleChange($event)"
    >
      {{ slideToggleText }}
    </mat-slide-toggle>

    <!-- New: Support for multiple action buttons -->
    <ng-container *ngIf="actionButtons && actionButtons.length > 0">
      <div
        *ngFor="let button of actionButtons"
        [matTooltip]="button.tooltip || ''"
        [matTooltipClass]="button.tooltipClass || ''"
        matTooltipPosition="below"
      >
        <button
          mat-flat-button
          color="primary"
          [disabled]="button.disabled"
          (click)="onActionButtonClick(button.action)"
        >
          <mat-icon *ngIf="button.icon">{{ button.icon }}</mat-icon>
          <span class="primary-button-text">{{ button.translationKey | translate }}</span>
        </button>
      </div>
    </ng-container>

    <!-- Legacy: Single primary button (for backward compatibility) -->
    <div
      *ngIf="showPrimaryButton && (!actionButtons || actionButtons.length === 0)"
      [matTooltip]="primaryButtonTooltip || ''"
      [matTooltipClass]="primaryButtonTooltipClass || ''"
      [matTooltipPosition]="primaryButtonTooltipPosition"
    >
      <button
        mat-flat-button
        color="primary"
        [disabled]="primaryActionBtnDisabled"
        (click)="onPrimaryButtonClick()"
      >
        <mat-icon *ngIf="primaryButtonIcon">{{ primaryButtonIcon }}</mat-icon>
        <span class="primary-button-text">{{ primaryButtonText }}</span>
      </button>
    </div>
  </div>

  <div class="options-container dense-2">
    <button *ngIf="showMenuButton" mat-icon-button [matMenuTriggerFor]="menu" [disabled]="!menuButtonItems?.length">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <ng-container *ngFor="let item of menuButtonItems">
        <button *ngIf="!item.disabled" mat-menu-item (click)="onMenuButtonItemClick(item.action)">
          <span class="ft-14-400">{{ item.label | translate | titlecase }}</span>
        </button>
      </ng-container>
    </mat-menu>

    <button mat-icon-button [disabled]="sectionCardExpandBtnDisabled" (click)="onSectionCardExpandChange()">
      <mat-icon>{{ isSectionCardExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
    </button>
  </div>
</div>
